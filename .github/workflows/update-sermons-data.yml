name: Update Sermons Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-commit:
    if: github.repository == 'providencebaptist/providencebaptist.github.io'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch sermons data
        env:
          SERMON_AUDIO_API_KEY: ${{ secrets.SERMON_AUDIO_API_KEY }}
        run: |
          python - <<'PY'
          import json
          from urllib.parse import urljoin
          from urllib.request import Request, urlopen

          API_ROOT = "https://api.sermonaudio.com"
          INITIAL_URL = (
              "https://api.sermonaudio.com/v2/node/sermons?page=1&exactRefMatch=false&featured=false"
              "&includeTranscripts=false&requireAudio=false&requireVideo=false&requirePDF=false"
              "&noMedia=false&vacantPulpit=false&staffPick=false&listenerRecommended=false"
              "&lite=false&liteBroadcaster=false&cache=false&includeDrafts=false"
              "&includeScheduled=false&includePublished=true&includeGlobalChildren=false"
          )
          MAX_PAGES = 500

          def fetch_page(url: str, api_key: str) -> dict:
              request = Request(
                  url,
                  headers={
                      "accept": "application/json",
                      "X-Api-Key": api_key,
                  },
              )
              with urlopen(request) as response:
                  return json.load(response)

          api_key = "${SERMON_AUDIO_API_KEY}"
          if not api_key:
              raise RuntimeError("SERMON_AUDIO_API_KEY is not set")

          current_url = INITIAL_URL
          page_count = 0
          combined_results = []
          seen_sermon_ids = set()
          payload_template = None

          while current_url and page_count < MAX_PAGES:
              data = fetch_page(current_url, api_key)
              page_count += 1

              if payload_template is None:
                  payload_template = {k: v for k, v in data.items() if k != "results"}

              for sermon in data.get("results", []):
                  sermon_id = sermon.get("sermonID")
                  if sermon_id and sermon_id in seen_sermon_ids:
                      continue
                  if sermon_id:
                      seen_sermon_ids.add(sermon_id)
                  combined_results.append(sermon)

              next_path = data.get("next")
              current_url = urljoin(API_ROOT, next_path) if next_path else None

          if payload_template is None:
              raise RuntimeError("No SermonAudio payload was fetched")

          payload_template["results"] = combined_results
          payload_template["totalCount"] = len(combined_results)
          payload_template["next"] = None

          with open("public/sermons-data.json", "w", encoding="utf-8") as output:
              json.dump(payload_template, output, separators=(",", ":"))

          print(f"Fetched {len(combined_results)} sermons across {page_count} page(s).")
          PY

      - name: Commit changes
        run: |
          if git status --porcelain | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/sermons-data.json
            git commit -m "chore: update sermons data"
            git push
          else
            echo "No changes to commit"
          fi

  deploy:
    needs: fetch-and-commit
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && github.repository == 'providencebaptist/providencebaptist.github.io' && github.event.repository.has_pages }}
    env:
      NODE_ENV: production
      VITE_ENABLE_ANALYTICS: 'true'
      SERMON_AUDIO_API_KEY: ${{ secrets.SERMON_AUDIO_API_KEY }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps --include=dev
      - run: npm run build
      - run: node scripts/generate-sitemap.js
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - id: deployment
        uses: actions/deploy-pages@v4
